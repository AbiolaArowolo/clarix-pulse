# Pulse node config for NJ Optimum.
# Replace agent_token and any UDP stream URLs before deployment.

node_id: nj-optimum-pc
node_name: NJ OPTIMUM
site_id: nj-optimum
hub_url: https://pulse.clarixtech.com
agent_token: REPLACE_ME_NJ_OPTIMUM_PC_TOKEN
poll_interval_seconds: 10

players:
  - player_id: nj-optimum-admax-1
    playout_type: admax
    paths:
      admax_root_candidates:
        - C:\Program Files (x86)\Unimedia\Admax One*\admax
        - C:\Program Files\Unimedia\Admax One*\admax
    process_selectors:
      window_title_contains:
        - Admax 1
    log_selectors:
      include_contains:
        - Admax 1
    udp_inputs:
      # Optional future UDP monitoring matrix for NJ Optimum.
      - udp_input_id: nj-optimum-admax-1-udp-1
        enabled: false
        stream_url: "udp://REPLACE_ME_NJ_OPTIMUM_ADMAX_1_UDP_1"
        thumbnail_interval_s: 10
      - udp_input_id: nj-optimum-admax-1-udp-2
        enabled: false
        stream_url: "udp://REPLACE_ME_NJ_OPTIMUM_ADMAX_1_UDP_2"
        thumbnail_interval_s: 10
