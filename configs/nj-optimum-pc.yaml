# Pulse node config for NJ Optimum.
# Replace agent_token and any UDP stream URLs before deployment.

node_id: nj-optimum-pc
node_name: NJ OPTIMUM
site_id: nj-optimum
hub_url: https://pulse.clarixtech.com
agent_token: REPLACE_ME_NJ_OPTIMUM_PC_TOKEN
poll_interval_seconds: 2

players:
  - player_id: nj-optimum-insta-1
    playout_type: insta
    paths:
      shared_log_dir: C:\Program Files\Indytek\Insta log
      instance_root: C:\Program Files\Indytek\Insta Playout\Settings
    udp_inputs:
      # Optional future UDP monitoring matrix for NJ Optimum.
      - udp_input_id: nj-optimum-insta-1-udp-1
        enabled: false
        stream_url: "udp://REPLACE_ME_NJ_OPTIMUM_INSTA_1_UDP_1"
        thumbnail_interval_s: 10
      - udp_input_id: nj-optimum-insta-1-udp-2
        enabled: false
        stream_url: "udp://REPLACE_ME_NJ_OPTIMUM_INSTA_1_UDP_2"
        thumbnail_interval_s: 10
      - udp_input_id: nj-optimum-insta-1-udp-3
        enabled: false
        stream_url: "udp://REPLACE_ME_NJ_OPTIMUM_INSTA_1_UDP_3"
        thumbnail_interval_s: 10
      - udp_input_id: nj-optimum-insta-1-udp-4
        enabled: false
        stream_url: "udp://REPLACE_ME_NJ_OPTIMUM_INSTA_1_UDP_4"
        thumbnail_interval_s: 10
      - udp_input_id: nj-optimum-insta-1-udp-5
        enabled: false
        stream_url: "udp://REPLACE_ME_NJ_OPTIMUM_INSTA_1_UDP_5"
        thumbnail_interval_s: 10
