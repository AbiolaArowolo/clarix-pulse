# Pulse node config for NY Main.
# Replace agent_token and any UDP stream URLs before deployment.

node_id: ny-main-pc
node_name: NY MAIN
site_id: ny-main
hub_url: https://pulse.clarixtech.com
agent_token: REPLACE_ME_NY_MAIN_PC_TOKEN
poll_interval_seconds: 10

players:
  - player_id: ny-main-insta-1
    playout_type: insta
    paths:
      shared_log_dir: C:\Program Files\Indytek\Insta log
      instance_root: C:\Program Files\Indytek\Insta Playout\Settings
      fnf_log: C:\Program Files\Indytek\Insta Playout\logs\FNF
      playlistscan_log: C:\Program Files\Indytek\Insta Playout\logs\playlistscan
    process_selectors:
      window_title_contains:
        - Insta 1
    log_selectors:
      include_contains:
        - Insta 1
    udp_inputs:
      # Disabled by default. Replace the stream_url values and flip enabled to true
      # when NY Main needs UDP monitoring on this player.
      - udp_input_id: ny-main-insta-1-udp-1
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_INSTA_1_UDP_1"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-insta-1-udp-2
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_INSTA_1_UDP_2"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-insta-1-udp-3
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_INSTA_1_UDP_3"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-insta-1-udp-4
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_INSTA_1_UDP_4"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-insta-1-udp-5
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_INSTA_1_UDP_5"
        thumbnail_interval_s: 10

  - player_id: ny-main-insta-2
    playout_type: insta
    paths:
      shared_log_dir: C:\Program Files\Indytek\Insta log
      instance_root: C:\Program Files\Indytek\Insta Playout 2\Settings
      fnf_log: C:\Program Files\Indytek\Insta Playout 2\logs\FNF
      playlistscan_log: C:\Program Files\Indytek\Insta Playout 2\logs\playlistscan
    process_selectors:
      window_title_contains:
        - Insta 2
    log_selectors:
      include_contains:
        - Insta 2
    udp_inputs:
      - udp_input_id: ny-main-insta-2-udp-1
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_INSTA_2_UDP_1"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-insta-2-udp-2
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_INSTA_2_UDP_2"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-insta-2-udp-3
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_INSTA_2_UDP_3"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-insta-2-udp-4
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_INSTA_2_UDP_4"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-insta-2-udp-5
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_INSTA_2_UDP_5"
        thumbnail_interval_s: 10

  - player_id: ny-main-admax-1
    playout_type: admax
    paths:
      admax_root_candidates:
        - C:\Program Files (x86)\Unimedia\Admax One*\admax
        - C:\Program Files\Unimedia\Admax One*\admax
    process_selectors:
      window_title_contains:
        - Admax 1
    log_selectors:
      include_contains:
        - Admax 1
    udp_inputs:
      - udp_input_id: ny-main-admax-1-udp-1
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_ADMAX_1_UDP_1"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-admax-1-udp-2
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_ADMAX_1_UDP_2"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-admax-1-udp-3
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_ADMAX_1_UDP_3"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-admax-1-udp-4
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_ADMAX_1_UDP_4"
        thumbnail_interval_s: 10
      - udp_input_id: ny-main-admax-1-udp-5
        enabled: false
        stream_url: "udp://REPLACE_ME_NY_MAIN_ADMAX_1_UDP_5"
        thumbnail_interval_s: 10
