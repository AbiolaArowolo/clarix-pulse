site:
  id: nj-optimum
  name: NJ optimum

instance:
  id: nj-optimum-admax-1
  label: NJ optimum Admax 1
  playout_type: admax

assumptions:
  supersedes_reference_instance: optimum-insta-1
  internet_loss_is_not_off_air: true
  output_path_status: unconfirmed
  output_confidence_required_for_confirmed_off_air: true

probes:
  local_agent:
    enabled: true

  runtime_probe:
    enabled: true
    process_allowlist:
      - Admax-One Playout2.0.exe
      - Admax-One Playout2.0.2.exe
    process_denylist_as_primary:
      - admaxter.exe
    require_interactive_window_check: true
    playback_heartbeat:
      enabled: false
      note: >
        Enable only after a file, API field, DB field, or log entry is proven
        to advance during healthy live playback.

  output_probe:
    enabled: false
    preferred_sources:
      - sdi_capture_confidence
      - encoder_confidence
      - downstream_probe
    audio_supporting_only: true

  connectivity_probe:
    enabled: true
    internet_targets:
      - 1.1.1.1
      - 8.8.8.8

metrics:
  agent_heartbeat_age_seconds:
    warning: 45
    critical: 90

  playout_process_up:
    critical_if_zero_for_seconds: 15

  playout_window_up:
    critical_if_zero_for_seconds: 30

  playout_restart_events_15m:
    critical_if_gte: 2

  playout_runtime_heartbeat_age_seconds:
    enabled: false
    warning: 45
    critical: 90

  output_signal_present:
    enabled: false
    critical_if_zero_for_seconds: 10

  output_freeze_seconds:
    enabled: false
    critical_if_gte: 20

  output_black_ratio_10s:
    enabled: false
    critical_if_gte: 0.98

  output_audio_silence_seconds:
    enabled: false
    critical_if_gte: 30
    supporting_only: true

  internet_up:
    critical_if_zero_for_seconds: 60

  gateway_up:
    critical_if_zero_for_seconds: 30

state_rules:
  - name: confirmed_off_air_signal_missing
    when: output_probe.enabled && output_signal_present == 0 for 10s
    set:
      broadcast_health: off_air_confirmed
      connectivity_health: online
      severity: critical

  - name: confirmed_off_air_output_frozen
    when: output_probe.enabled && output_freeze_seconds >= 20
    set:
      broadcast_health: off_air_confirmed
      severity: critical

  - name: confirmed_off_air_black
    when: output_probe.enabled && output_black_ratio_10s >= 0.98 for 20s
    set:
      broadcast_health: off_air_confirmed
      severity: critical

  - name: likely_playout_failure_process_missing
    when: playout_process_up == 0 for 15s
    set:
      broadcast_health: off_air_likely
      severity: critical

  - name: degraded_window_missing
    when: playout_process_up == 1 && playout_window_up == 0 for 30s
    set:
      broadcast_health: degraded
      severity: warning

  - name: degraded_restart_loop
    when: playout_restart_events_15m >= 2
    set:
      broadcast_health: degraded
      severity: warning

  - name: likely_playout_failure_internal_heartbeat
    when: playout_runtime_heartbeat_age_seconds >= 90
    set:
      broadcast_health: off_air_likely
      severity: critical

  - name: network_issue_hub_heartbeat_missing
    when: agent_heartbeat_age_seconds >= 90
    set:
      connectivity_health: offline
      broadcast_health: unknown
      severity: warning

  - name: network_issue_internet_missing
    when: internet_up == 0 for 60s && playout_process_up == 1
    set:
      connectivity_health: offline
      broadcast_health: unknown
      severity: warning

automation:
  mode: alert_only
  restart_after_seconds: 180
  restart_target: admax_application_only
  suppress_during_maintenance: true

alerts:
  critical:
    - "OFF AIR: NJ optimum Admax output signal missing"
    - "OFF AIR: NJ optimum Admax output frozen"
    - "PLAYOUT FAILURE LIKELY: NJ optimum Admax process missing"
  warning:
    - "DEGRADED: NJ optimum Admax restart loop detected"
    - "NETWORK ISSUE: NJ optimum Admax heartbeat missing, playback state unknown"
  recovery:
    - "RECOVERED: NJ optimum Admax output confidence restored"
    - "RECOVERED: NJ optimum Admax runtime normal"
